; ACS 3-Way Transfer dialplan context
; Included from /etc/asterisk/extensions.conf
; Manages the ConfBridge bridge for AI-triggered and operator-triggered transfers.
;
; Variables expected on entry:
;   LEAD_ID        — ViciDial lead_id (set via AMI Setvar before Redirect)
;   CONF_BRIDGE_ID — Unique bridge name (lead's Asterisk Uniqueid, set via AMI Setvar)
;   LEAD_NAME      — Lead full name for whisper (passed via AMI Originate Variable)
;   PRODUCT_NAME   — Product of interest for whisper (passed via AMI Originate Variable)
;   TRANSFER_RESULT — SCHDL or CALLBK (set by transfer_bridge.py)

[ai-transfer-verifier]

; --- Lead leg ---
; Lead is redirected here via AMI Redirect. Joins ConfBridge and waits for verifier.
exten => s,1,NoOp(ACS Transfer: Lead waiting in bridge XFER-${CONF_BRIDGE_ID})
 same => n,Set(CHANNEL(musicclass)=default)
 same => n,ConfBridge(XFER-${CONF_BRIDGE_ID},default_bridge,default_user)
 same => n,Hangup()

; --- Verifier leg ---
; Verifier is originated here. Hears whisper AGI, then joins same bridge.
exten => verifier,1,NoOp(ACS Transfer: Verifier joining bridge XFER-${CONF_BRIDGE_ID})
 same => n,Answer()
 same => n,AGI(whisper.py,${LEAD_NAME},${PRODUCT_NAME})
 same => n,ConfBridge(XFER-${CONF_BRIDGE_ID},default_bridge,default_user)
 same => n,Hangup()

; --- Hangup handler ---
; Fired when all parties leave. Writes SCHDL or CALLBK disposition.
exten => h,1,NoOp(ACS Transfer: h-extension LEAD_ID=${LEAD_ID} TRANSFER_RESULT=${TRANSFER_RESULT})
 same => n,GotoIf($["${TRANSFER_RESULT}" = "SCHDL"]?schdl,1:callbk,1)

exten => schdl,1,AGI(disposition.py,${LEAD_ID},SCHDL,transfer-completed)
 same => n,Hangup()

exten => callbk,1,AGI(disposition.py,${LEAD_ID},CALLBK,transfer-no-answer)
 same => n,Hangup()
