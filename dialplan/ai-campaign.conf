; ============================================================================
; ai-campaign.conf - VAPI AI agent campaign routing for ViciDial Asterisk
;
; Flow:
;   ViciDial outbound dialer answers the lead → enters [ai-campaign-in]
;     1. AMD precheck: skip VAPI if answering machine or dead air
;     2. Live human → bridge to avr-bridge SIP peer → avr-core → VAPI
;     3. After hangup: disposition.py writes the final status to ViciDial
;
; Required:
;   - chan_sip peer [avr-bridge] pointing at the avr-asterisk container
;     (see infra/asterisk-host/snippets.conf in this release).
;   - AGI scripts deployed to /var/lib/asterisk/agi-bin/:
;       precheck_amd.py    (chmod +x, owned by asterisk)
;       disposition.py
;   - Config at /etc/ai_agent/config.yaml (see config/config.yaml.example).
; ============================================================================

[ai-campaign-in]
exten => s,1,NoOp(AI campaign entry - lead=${lead_id} campaign=${campaign_id})
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,AGI(precheck_amd.py,${lead_id},${campaign_id},${user})
 same => n,NoOp(precheck handoff=${AI_HANDOFF} status=${AI_STATUS})
 same => n,GotoIf($["${AI_HANDOFF}" = "yes"]?handoff,1)
 same => n(skipai),AGI(disposition.py,${lead_id},${AI_STATUS},precheck-${AI_STATUS})
 same => n,Hangup()

exten => handoff,1,NoOp(Bridging to AVR/VAPI)
 same => n,Set(__lead_id=${lead_id})
 same => n,Set(__campaign_id=${campaign_id})
 same => n,Set(__user=${user})
 same => n,Set(REC_NAME=ai-${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${lead_id})
 same => n,MixMonitor(${REC_NAME}.wav,b,)
 same => n,Dial(SIP/avr-bridge/s,600,)
 same => n,Hangup()

; Hangup handler: write the final disposition.
; VAPI server-side tool-calls should write FINAL_STATUS via AMI SetVar.
; If unset, we default to DROP.
exten => h,1,NoOp(Hangup - final_status=${FINAL_STATUS} dial=${DIALSTATUS})
 same => n,Set(STATUS=${IF($["${FINAL_STATUS}" != ""]?${FINAL_STATUS}:DROP)})
 same => n,AGI(disposition.py,${lead_id},${STATUS},${DIALSTATUS})
