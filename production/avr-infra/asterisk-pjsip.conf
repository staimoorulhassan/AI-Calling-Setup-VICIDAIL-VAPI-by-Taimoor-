; ViciDial trunk - accepts unauthenticated SIP calls from main Asterisk
[vicidial-trunk]
type=endpoint
transport=transport-udp
context=from-vicidial
disallow=all
allow=ulaw,alaw
direct_media=no
force_rport=no
rewrite_contact=yes
rtp_symmetric=yes

[vicidial-trunk]
type=identify
endpoint=vicidial-trunk
match=127.0.0.1
match=172.18.0.1
match=192.168.32.129

; === UDP transport for ViciDial main Asterisk integration ===
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0
external_media_address=172.18.0.5
external_signaling_address=172.18.0.5
local_net=172.18.0.0/16
local_net=127.0.0.1/32

; Outbound registration: register gs102 to main ViciDial Asterisk
[reg-gs102]
type=registration
transport=transport-udp
outbound_auth=auth-gs102
server_uri=sip:172.18.0.1
client_uri=sip:gs102@172.18.0.1
retry_interval=30

[auth-gs102]
type=auth
auth_type=userpass
username=gs102
password=test

; Outbound registration: register 201 to main ViciDial Asterisk
[reg-201]
type=registration
transport=transport-udp
outbound_auth=auth-201
server_uri=sip:172.18.0.1
client_uri=sip:201@172.18.0.1
retry_interval=30

[auth-201]
type=auth
auth_type=userpass
username=201
password=A1b2c3d4
