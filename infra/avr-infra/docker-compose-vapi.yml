services:
  avr-core:
    image: agentvoiceresponse/avr-core
    platform: linux/x86_64
    container_name: avr-core
    restart: always
    environment:
      - PORT=5001
      - HTTP_PORT=6001
      - STS_URL=ws://avr-sts-vapi:6042
      - VAD_POSITIVE_SPEECH_THRESHOLD=0.001
      - VAD_NEGATIVE_SPEECH_THRESHOLD=0.001
    ports:
      - 5001:5001
      - 6001:6001
    networks:
      - avr

  avr-sts-vapi:
    build:
      context: ../avr-sts-vapi
      dockerfile: Dockerfile
    container_name: avr-sts-vapi
    restart: always
    environment:
      - PORT=6042
      - VAPI_PRIVATE_KEY=${VAPI_PRIVATE_KEY}
      - VAPI_ASSISTANT_ID=${VAPI_ASSISTANT_ID}
      - VICIDIAL_URL=${VICIDIAL_URL:-}
      - VICIDIAL_USER=${VICIDIAL_USER:-admin}
      - VICIDIAL_PASS=${VICIDIAL_PASS:-}
      - VICIDIAL_AGENT_USER=${VICIDIAL_AGENT_USER:-}
      - VICIDIAL_AGENT_PASS=${VICIDIAL_AGENT_PASS:-}
      - AMD_SENSITIVITY=${AMD_SENSITIVITY:-conservative}
    networks:
      - avr

  avr-asterisk:
    image: agentvoiceresponse/avr-asterisk
    platform: linux/x86_64
    container_name: avr-asterisk
    restart: always
    ports:
      - 5062:5060/udp    # SIP — using 5062 to avoid conflict with ViciDial's Asterisk on 5060
      - 5039:5038        # AMI
      - 8090:8088        # ARI HTTP
      - 8091:8089        # ARI WS
      - 20100-20150:10000-10050/udp   # RTP — offset to avoid ViciDial RTP range
    volumes:
      - ./asterisk/conf/manager.conf:/etc/asterisk/my_manager.conf
      - ./asterisk/conf/pjsip.conf:/etc/asterisk/my_pjsip.conf
      - ./asterisk/conf/extensions.conf:/etc/asterisk/my_extensions.conf
      - ./asterisk/conf/queues.conf:/etc/asterisk/my_queues.conf
      - ./asterisk/conf/ari.conf:/etc/asterisk/my_ari.conf
    networks:
      - avr

  avr-ami:
    image: agentvoiceresponse/avr-ami
    platform: linux/x86_64
    container_name: avr-ami
    restart: always
    environment:
      - PORT=6006
      - AMI_HOST=avr-asterisk
      - AMI_PORT=5038
      - AMI_USERNAME=${AMI_USERNAME:-avr}
      - AMI_PASSWORD=${AMI_PASSWORD:-avr}
    ports:
      - 6006:6006
    networks:
      - avr

networks:
  avr:
    name: avr
    driver: bridge
