; ============================================================================
; Host ViciDial Asterisk snippets used by the AI campaign integration.
; Copy these into the matching files on the host. Do NOT paste this file
; whole — the contents are split across two real files.
; ============================================================================

; ---------- Append to /etc/asterisk/sip-vicidial.conf -----------------------
[avr-bridge]
type=peer
host=172.18.0.5
port=5060
context=from-vicidial
disallow=all
allow=ulaw,alaw
directmedia=no
canreinvite=no
nat=force_rport,comedia
qualify=yes
qualifyfreq=15
rtp_symmetric=yes
rtp_keepalive=10
rtptimeout=120
rtpholdtimeout=180
insecure=port,invite

